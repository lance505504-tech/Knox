name: Knox Backup

on:
  push:
    branches: [main]
    paths:
      - 'repository.json'
      - 'active/**'
      - 'logs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: knox-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Back up changed files
        run: |
          TS=$(date -u '+%Y-%m-%d-%H%M%S')
          mkdir -p backups/repository backups/notes backups/dev-log backups/active
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            FILES=$(git show --name-only --format='' HEAD)
          fi
          echo "Changed: $FILES"
          for F in $FILES; do
            [ -f "$F" ] || continue
            case "$F" in
              repository.json) cp "$F" "backups/repository/$TS.json" ;;
              logs/dev-log.md) cp "$F" "backups/dev-log/$TS.md" ;;
              active/notes.md) cp "$F" "backups/notes/$TS.md" ;;
              active/*)
                N=$(echo "$F" | sed 's|active/||;s|/|-|g')
                cp "$F" "backups/active/$TS-$N" ;;
            esac
          done

      - name: Prune to 30 per folder
        run: |
          for DIR in backups/repository backups/notes backups/dev-log backups/active; do
            [ -d "$DIR" ] || continue
            ls -t "$DIR" | grep -v '^\.' | tail -n +31 | while read F; do
              rm "$DIR/$F" && echo "Pruned: $F"
            done
          done

      - name: Update manifest
        run: |
          python3 -c "
          import os, json
          from datetime import datetime
          m = {'generated': datetime.utcnow().isoformat()+'Z', 'folders': {}}
          for d in sorted(os.listdir('backups')):
              p = os.path.join('backups', d)
              if not os.path.isdir(p): continue
              vs = sorted([f for f in os.listdir(p) if not f.startswith('.')], reverse=True)
              m['folders'][d] = {'count': len(vs), 'newest': vs[0] if vs else None, 'versions': vs}
          open('backups/manifest.json', 'w').write(json.dumps(m, indent=2))
          print('Manifest updated')
          "

      - name: Commit and push
        run: |
          git config user.name "knox-backup[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "knox: backup $(date -u '+%Y-%m-%d %H:%M') UTC [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
